name: Code check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: code-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (all packages)
        run: pnpm -r typecheck

      - name: Lint (warn-mode until eslint config locked)
        run: pnpm -r lint || true
