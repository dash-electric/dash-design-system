name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@dash-tech"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter "@dash-tech/dashkit" build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Publishes @dash-tech/dashkit to GitHub Packages, restricted to the
      # @dash-tech org. Auth via GITHUB_TOKEN (provided by Actions).
      - name: Publish @dash-tech/dashkit to GitHub Packages
        run: pnpm --filter "@dash-tech/dashkit" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
