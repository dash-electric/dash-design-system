name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@dash-electric"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The trailing "..." also builds the CLI's workspace dependencies
      # (@dash/registry-schema) first — a plain --filter build would leave
      # its dist/ missing and fail to resolve the import.
      - name: Build CLI (with workspace deps)
        run: pnpm --filter "@dash-electric/dashkit..." build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Publishes @dash-electric/dashkit to GitHub Packages, restricted to the
      # dash-electric org. Auth via GITHUB_TOKEN (provided by Actions), which
      # has packages:write on this repo's org — the same org the @dash-electric
      # scope resolves to, so the publish is authorized.
      - name: Publish @dash-electric/dashkit to GitHub Packages
        run: pnpm --filter "@dash-electric/dashkit" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
