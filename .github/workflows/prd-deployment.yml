name: Production Deployment

# Deploys docs site + registry API to Cloud Run on v*.*.* tag push.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGION: asia-southeast2
  REPOSITORY: cloudrun-standard
  GOOGLE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE_NAME: dash-ds-registry

jobs:
  build-image:
    name: Build Image and Push to Artifact Registry
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write

    outputs:
      image_tag: ${{ steps.set-output.outputs.image_tag }}
      version: ${{ steps.commit.outputs.version }}
      commit_hash: ${{ steps.commit.outputs.hash }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version and Commit Hash
        id: commit
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Using release tag: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.NEXT_GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.GOOGLE_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.commit.outputs.hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set Output for Deploy Job
        id: set-output
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.GOOGLE_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.commit.outputs.hash }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest
    needs: build-image
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.NEXT_GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_PROJECT_ID }}

      - name: Create Environment File
        run: |
          cat > env.yaml << 'EOF'
          APP_ENV: "production"
          APP_PORT: "3000"
          APP_NAME: "${{ env.SERVICE_NAME }}"
          APP_VERSION: "${{ needs.build-image.outputs.version }}"
          NODE_ENV: "production"
          DASH_REGISTRY_TOKEN: "${{ secrets.DASH_REGISTRY_TOKEN }}"
          EOF

      - name: Deploy to Cloud Run (Production)
        run: |
          echo "Deploying image: ${{ needs.build-image.outputs.image_tag }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ needs.build-image.outputs.image_tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --memory 1Gi \
            --cpu 1 \
            --port 3000 \
            --env-vars-file env.yaml
