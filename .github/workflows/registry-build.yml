name: Registry build (drift detection)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: registry-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry:
    name: Build registry + verify no drift
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build registry
        run: pnpm registry:build

      - name: Verify no uncommitted diff in public/r/
        run: |
          if [ -n "$(git status --porcelain apps/docs/public/r 2>/dev/null)" ] || [ -n "$(git status --porcelain public/r 2>/dev/null)" ]; then
            echo "::error::Registry build produced uncommitted artifacts. Run 'pnpm registry:build' locally and commit the diff."
            git status --porcelain
            git diff --stat
            exit 1
          fi
          echo "Registry artifacts in sync."
