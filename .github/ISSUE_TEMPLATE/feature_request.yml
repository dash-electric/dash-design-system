name: Feature request
description: Propose a new component, CLI feature, or registry capability
title: "feat: "
labels: ["enhancement", "triage"]
assignees:
  - irfanprimaputra

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Help us understand the use case before discussing implementation.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to achieve? What problem does this solve?
      placeholder: As a [role], I want to [action] so that [benefit].
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketch, design ref, or behavior description.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds did you try? Why are they insufficient?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New component
        - New CLI command / flag
        - Registry / namespace change
        - Docs improvement
        - Tooling / DX
        - Other
    validations:
      required: true

  - type: dropdown
    id: pr-willingness
    attributes:
      label: Are you willing to submit a PR?
      options:
        - "Yes, I plan to implement this"
        - "Yes, with guidance"
        - "No, requesting only"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is aligned with dash-ds scope (internal Dash design system, not generic OSS).
          required: true
