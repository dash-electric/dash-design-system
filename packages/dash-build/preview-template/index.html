<!DOCTYPE html>
<!--
  Dash Build preview template — Sandpack iframe HTML shell.

  This file is read verbatim by `component-preview.ts` and shipped to Sandpack
  as `/public/index.html`. Sandpack's `react-ts` template would auto-generate
  a bare `<html><body><div id="root"></div></body></html>` otherwise; we
  override so the generated component renders with:

    - Tailwind utility classes (CDN play build) wired to Dash CSS variables
    - Plus Jakarta Sans preloaded from Google Fonts
    - Dash Layer 0 semantic tokens already injected via dash-tokens.css

  The Tailwind preset extends `colors` to map utility classes like
  `bg-success-light` / `text-information-base` to the corresponding
  `var(--bg-success-light)` so the generated TSX feels native even though
  Tailwind is loaded via CDN. Matches Dash spacing ramp + radius scale.

  DO NOT add raw hex here — colors must reference the CSS variables defined
  in dash-tokens.css. The audit:css scanner explicitly skips this file via
  the preview-template carve-out, but we keep the discipline anyway.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dash Build Preview</title>

    <!-- Plus Jakarta Sans — Dash brand typeface (Layer 0). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN (Play build) — utility classes the generator emits. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Map Tailwind utilities to Dash Layer 0 CSS variables so e.g.
      // `bg-success-light` resolves to `var(--bg-success-light)`. Spacing ramp
      // mirrors the 13-step Dash ramp; radius matches the sm/md/lg/pill scale.
      // Keep this preset in lock-step with `dash-tokens.css`.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Neutrals
              "bg-white-0": "var(--bg-white-0)",
              "bg-weak-50": "var(--bg-weak-50)",
              "bg-soft-200": "var(--bg-soft-200)",
              "bg-strong-950": "var(--bg-strong-950)",
              "text-strong-950": "var(--text-strong-950)",
              "text-sub-600": "var(--text-sub-600)",
              "text-soft-400": "var(--text-soft-400)",
              "text-disabled-300": "var(--text-disabled-300)",
              "text-white-0": "var(--text-white-0)",
              "stroke-strong-950": "var(--stroke-strong-950)",
              "stroke-sub-300": "var(--stroke-sub-300)",
              "stroke-soft-200": "var(--stroke-soft-200)",
              "stroke-white-0": "var(--stroke-white-0)",

              // Primary (Dash Purple)
              "primary-base": "var(--primary-base)",
              "primary-darker": "var(--primary-darker)",
              "primary-light": "var(--primary-light)",
              "primary-lighter": "var(--primary-lighter)",

              // Semantic state — base + light + lighter
              "success-base": "var(--bg-success-base)",
              "success-light": "var(--bg-success-light)",
              "success-lighter": "var(--bg-success-lighter)",
              "warning-base": "var(--bg-warning-base)",
              "warning-light": "var(--bg-warning-light)",
              "warning-lighter": "var(--bg-warning-lighter)",
              "error-base": "var(--bg-error-base)",
              "error-light": "var(--bg-error-light)",
              "error-lighter": "var(--bg-error-lighter)",
              "information-base": "var(--bg-information-base)",
              "information-light": "var(--bg-information-light)",
              "information-lighter": "var(--bg-information-lighter)",
            },
            fontFamily: {
              sans: [
                "Plus Jakarta Sans",
                "system-ui",
                "-apple-system",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
              mono: [
                "JetBrains Mono",
                "SF Mono",
                "Menlo",
                "Consolas",
                "monospace",
              ],
            },
            borderRadius: {
              sm: "var(--radius-sm)",
              md: "var(--radius-md)",
              lg: "var(--radius-lg)",
              pill: "var(--radius-pill)",
            },
            spacing: {
              "dash-1": "var(--spacing-1)",
              "dash-2": "var(--spacing-2)",
              "dash-3": "var(--spacing-3)",
              "dash-4": "var(--spacing-4)",
              "dash-5": "var(--spacing-5)",
              "dash-6": "var(--spacing-6)",
              "dash-7": "var(--spacing-7)",
              "dash-8": "var(--spacing-8)",
              "dash-9": "var(--spacing-9)",
              "dash-10": "var(--spacing-10)",
              "dash-11": "var(--spacing-11)",
              "dash-12": "var(--spacing-12)",
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
